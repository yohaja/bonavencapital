<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Risk Calculator - Bonaven</title>
    
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #050505; 
            color: #ededed; 
            min-height: 100vh;
        }
        
        .label-text { 
            display: block; 
            font-size: 0.65rem; 
            color: #737373; 
            margin-bottom: 0.5rem; 
            text-transform: uppercase; 
            letter-spacing: 0.1em; 
            font-weight: 500; 
        }
        
        .input-minimal { 
            width: 100%; 
            background-color: transparent; 
            border: 1px solid #262626; 
            color: #fff; 
            padding: 0.75rem 0; 
            border-radius: 0; 
            border-top: none;
            border-left: none;
            border-right: none;
            outline: none;
            font-variant-numeric: tabular-nums;
            transition: border-color 0.2s;
            font-size: 1rem;
        }
        
        .input-minimal:focus { 
            border-bottom-color: #a38c52; 
        }

        select.input-minimal {
            appearance: none;
            cursor: pointer;
            border: 1px solid #262626;
            padding: 0.75rem 1rem;
        }
        select.input-minimal:focus { border-color: #a38c52; }
        
        .btn-minimal { 
            flex: 1; 
            padding: 0.75rem; 
            text-align: center; 
            cursor: pointer; 
            font-size: 0.75rem; 
            letter-spacing: 0.05em;
            transition: all 0.2s; 
            border: 1px solid #262626;
        }
        
        .btn-minimal.active { background: #fff; color: #000; border-color: #fff; }
        .btn-minimal.inactive { color: #737373; background: transparent; }
        .btn-minimal.inactive:hover { color: #d4d4d4; }
    </style>
</head>
<body class="antialiased selection:bg-neutral-800 selection:text-white">
    <div id="root"></div>

    <script type="text/babel" data-presets="react">
        const { useState, useEffect } = React;

        const SYMBOLS = [
            { name: 'XAUUSD', type: 'gold', pipSize: 0.01, contractSize: 100 },
            { name: 'EURUSD', type: 'forex', pipSize: 0.0001, contractSize: 100000 },
            { name: 'GBPUSD', type: 'forex', pipSize: 0.0001, contractSize: 100000 },
            { name: 'USDJPY', type: 'jpy', pipSize: 0.01, contractSize: 100000 },
        ];

        const App = () => {
            const [symbolIndex, setSymbolIndex] = useState(0); 
            const [position, setPosition] = useState('LONG');
            
            // State dikosongkan ("") agar tidak ada angka yang perlu dihapus manual
            const [balance, setBalance] = useState("");
            const [riskPercent, setRiskPercent] = useState("1"); 
            const [entryPrice, setEntryPrice] = useState("");
            const [stopLoss, setStopLoss] = useState("");
            const [takeProfit, setTakeProfit] = useState("");

            const [results, setResults] = useState({
                targetRisk: 0,
                lots: 0,
                slPips: 0,
                tpPips: 0,
                rr: 0,
                netSL: 0,
                netTP: 0,
                pipValue: 0,
                isValid: true
            });

            const fmtMoney = (n) => new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(n);
            
            useEffect(() => {
                const currentSymbol = SYMBOLS[symbolIndex];
                const { type, pipSize, contractSize } = currentSymbol;
                
                // Konversi aman (jika kosong, bernilai 0)
                const numBalance = parseFloat(balance) || 0;
                const numRisk = parseFloat(riskPercent) || 0;
                const numEntry = parseFloat(entryPrice) || 0;
                const numSL = parseFloat(stopLoss) || 0;
                const numTP = parseFloat(takeProfit) || 0;

                let diffSL = 0; let diffTP = 0; let isValid = true;

                if (position === 'LONG') {
                    diffSL = numEntry - numSL;
                    diffTP = numTP - numEntry;
                    if (diffSL <= 0 && numSL !== 0) isValid = false;
                } else {
                    diffSL = numSL - numEntry;
                    diffTP = numEntry - numTP;
                    if (diffSL <= 0 && numSL !== 0) isValid = false;
                }

                const slPips = isValid ? diffSL / pipSize : 0;
                const tpPips = isValid ? diffTP / pipSize : 0;

                let pipValuePerLot = 0;
                if (type === 'gold' || type === 'forex') pipValuePerLot = pipSize * contractSize;
                else if (type === 'usd-base' || type === 'jpy') pipValuePerLot = (pipSize * contractSize) / numEntry;

                const targetRiskMoney = numBalance * (numRisk / 100);
                let rawLot = 0;
                if (isValid && slPips > 0 && pipValuePerLot > 0) rawLot = targetRiskMoney / (slPips * pipValuePerLot);

                const finalLot = Math.floor(rawLot * 100) / 100;
                
                setResults({
                    targetRisk: targetRiskMoney,
                    lots: isFinite(finalLot) ? finalLot : 0,
                    slPips: slPips,
                    tpPips: tpPips,
                    rr: diffSL > 0 ? diffTP / diffSL : 0,
                    netSL: slPips * pipValuePerLot * finalLot,
                    netTP: tpPips * pipValuePerLot * finalLot,
                    pipValue: pipValuePerLot,
                    isValid: isValid
                });

            }, [symbolIndex, balance, riskPercent, position, entryPrice, stopLoss, takeProfit]);

            return (
                <div className="min-h-screen flex items-center justify-center p-4">
                    <div className="w-full max-w-4xl flex flex-col md:flex-row gap-12 md:gap-24">
                        
                        {/* INPUT SECTION */}
                        <div className="flex-1 space-y-8">
                            <div className="mb-10">
                                <h1 className="text-xl font-light tracking-wide text-white mb-1">Risk Calculator</h1>
                                <div className="h-[1px] w-12 bg-neutral-700"></div>
                            </div>

                            <div className="flex gap-2">
                                <div className={`btn-minimal ${position === 'LONG' ? 'active' : 'inactive'}`} onClick={() => setPosition('LONG')}>LONG</div>
                                <div className={`btn-minimal ${position === 'SHORT' ? 'active' : 'inactive'}`} onClick={() => setPosition('SHORT')}>SHORT</div>
                            </div>

                            <div>
                                <label className="label-text">Symbol/Pair</label>
                                <select className="input-minimal w-full" value={symbolIndex} onChange={(e) => setSymbolIndex(Number(e.target.value))}>
                                    {SYMBOLS.map((s, i) => (<option key={i} value={i} className="bg-black">{s.name}</option>))}
                                </select>
                            </div>

                            <div className="grid grid-cols-2 gap-8">
                                <div>
                                    <label className="label-text">Balance</label>
                                    <input type="number" className="input-minimal" placeholder="0" value={balance} onChange={e => setBalance(e.target.value)} />
                                </div>
                                <div>
                                    <label className="label-text">Risk (%)</label>
                                    <input type="number" step="0.1" className="input-minimal" placeholder="0" value={riskPercent} onChange={e => setRiskPercent(e.target.value)} />
                                </div>
                            </div>

                            <div className="pt-4 space-y-6">
                                <div>
                                    <label className="label-text">Entry Price</label>
                                    <input type="number" className="input-minimal" step="any" placeholder="0.00" value={entryPrice} onChange={e => setEntryPrice(e.target.value)} />
                                </div>

                                <div className="grid grid-cols-2 gap-8">
                                    <div>
                                        <label className="label-text">Stop Loss</label>
                                        <input type="number" className="input-minimal" step="any" placeholder="0.00" value={stopLoss} onChange={e => setStopLoss(e.target.value)} />
                                    </div>
                                    <div>
                                        <label className="label-text">Take Profit</label>
                                        <input type="number" className="input-minimal" step="any" placeholder="0.00" value={takeProfit} onChange={e => setTakeProfit(e.target.value)} />
                                    </div>
                                </div>
                            </div>

                            {!results.isValid && (
                                <div className="text-xs text-red-500 mt-2 border-l border-red-500 pl-3 py-1">
                                    Invalid parameter: SL placement is incorrect.
                                </div>
                            )}
                        </div>

                        {/* RESULT SECTION */}
                        <div className="flex-1 flex flex-col justify-center">
                            <div className="border border-neutral-800 p-8 md:p-12">
                                <div className="mb-12">
                                    <p className="label-text">Recommended Lots</p>
                                    <p className="text-6xl md:text-7xl font-light tracking-tighter text-white">
                                        {results.lots.toFixed(2)}
                                    </p>
                                </div>

                                <div className="grid grid-cols-2 gap-y-8 gap-x-4 mb-10">
                                    <div>
                                        <p className="label-text">Risk Value</p>
                                        <p className="text-lg font-medium text-neutral-300">{fmtMoney(results.targetRisk)}</p>
                                    </div>
                                    <div>
                                        <p className="label-text">Reward Ratio</p>
                                        <p className="text-lg font-medium text-neutral-300">1 : {results.rr.toFixed(2)}</p>
                                    </div>
                                </div>

                                <div className="h-[1px] w-full bg-neutral-800 mb-8"></div>

                                <div className="space-y-6">
                                    <div className="flex justify-between items-end">
                                        <div>
                                            <p className="label-text">SL Distance</p>
                                            <p className="text-sm text-white">{results.slPips.toFixed(1)} pips</p>
                                        </div>
                                        <div className="text-right">
                                            <p className="text-lg font-mono text-white">-{fmtMoney(results.netSL)}</p>
                                        </div>
                                    </div>

                                    <div className="flex justify-between items-end">
                                        <div>
                                            <p className="label-text">TP Distance</p>
                                            <p className="text-sm text-white">{results.tpPips.toFixed(1)} pips</p>
                                        </div>
                                        <div className="text-right">
                                            <p className="text-lg font-mono text-white">+{fmtMoney(results.netTP)}</p>
                                        </div>
                                    </div>
                                </div>
                                
                            </div>
                        </div>
                        
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
