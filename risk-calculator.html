<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bonaven Risk Calculator</title>
    
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Konfigurasi Tailwind untuk manual Dark Mode -->
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #ffffff; /* Light theme default */
            color: #111827; 
            margin: 0;
            padding: 0;
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        
        .dark body {
            background-color: #050505; 
            color: #ededed; 
        }
        
        .label-text { 
            display: block; 
            font-size: 0.65rem; 
            color: #6b7280; /* Light theme label */
            margin-bottom: 0.5rem; 
            text-transform: uppercase; 
            letter-spacing: 0.1em; 
            font-weight: 600; 
        }

        .dark .label-text {
            color: #737373;
        }
        
        .input-minimal { 
            width: 100%; 
            background-color: transparent; 
            border: 1px solid #e5e7eb; /* Light theme border */
            color: #111827; /* Light theme text */
            padding: 0.75rem 0; 
            border-radius: 0; 
            border-top: none;
            border-left: none;
            border-right: none;
            outline: none;
            font-variant-numeric: tabular-nums;
            transition: border-color 0.2s;
            font-size: 1rem;
        }

        .dark .input-minimal {
            border-color: #262626;
            color: #fff;
        }
        
        .input-minimal:focus { border-bottom-color: #a38c52; }
        .dark .input-minimal:focus { border-bottom-color: #a38c52; }

        select.input-minimal {
            appearance: none;
            cursor: pointer;
            border: 1px solid #e5e7eb;
            padding: 0.75rem 1rem;
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%236b7280' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
            background-position: right 0.5rem center;
            background-repeat: no-repeat;
            background-size: 1.5em 1.5em;
        }

        .dark select.input-minimal { 
            border-color: #262626; 
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%23737373' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
        }
        select.input-minimal:focus { border-color: #a38c52; }
        
        .btn-minimal { 
            flex: 1; 
            padding: 0.75rem; 
            text-align: center; 
            cursor: pointer; 
            font-size: 0.75rem; 
            letter-spacing: 0.05em;
            transition: all 0.2s; 
            border: 1px solid #e5e7eb;
        }

        .dark .btn-minimal { border-color: #262626; }
        
        .btn-minimal.active { background: #111827; color: #fff; border-color: #111827; font-weight: 500;}
        .dark .btn-minimal.active { background: #fff; color: #000; border-color: #fff; }
        
        .btn-minimal.inactive { color: #6b7280; background: transparent; }
        .btn-minimal.inactive:hover { color: #111827; }
        
        .dark .btn-minimal.inactive { color: #737373; background: transparent; }
        .dark .btn-minimal.inactive:hover { color: #d4d4d4; }
    </style>
</head>
<body class="antialiased selection:bg-neutral-200 dark:selection:bg-neutral-800 selection:text-black dark:selection:text-white">
    <div id="root"></div>

    <script type="text/babel" data-presets="react">
        const { useState, useEffect } = React;

        const SYMBOLS = [
            { name: 'XAUUSD', type: 'gold', pipSize: 0.01, contractSize: 100 },
            { name: 'EURUSD', type: 'forex', pipSize: 0.0001, contractSize: 100000 },
            { name: 'GBPUSD', type: 'forex', pipSize: 0.0001, contractSize: 100000 },
            { name: 'USDJPY', type: 'jpy', pipSize: 0.01, contractSize: 100000 },
        ];

        const App = () => {
            // Theme State (Default Light)
            const [isDark, setIsDark] = useState(false);

            const [symbolIndex, setSymbolIndex] = useState(0); 
            const [position, setPosition] = useState('LONG');
            
            const [balance, setBalance] = useState("");
            const [riskPercent, setRiskPercent] = useState("1"); 
            const [entryPrice, setEntryPrice] = useState("");
            const [stopLoss, setStopLoss] = useState("");
            const [takeProfit, setTakeProfit] = useState("");

            const [results, setResults] = useState({
                targetRisk: 0,
                lots: 0,
                slPips: 0,
                tpPips: 0,
                rr: 0,
                netSL: 0,
                netTP: 0,
                pipValue: 0,
                isValid: true
            });

            // Effect untuk mengubah class 'dark' di elemen HTML (Tailwind Setup)
            useEffect(() => {
                if (isDark) {
                    document.documentElement.classList.add('dark');
                } else {
                    document.documentElement.classList.remove('dark');
                }
            }, [isDark]);

            const fmtMoney = (n) => new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(n);

            // Fungsi SUPER STRICT: Hanya izinkan angka dan MAKSIMAL SATU TITIK desimal
            const handleStrictNumber = (setter) => (e) => {
                const val = e.target.value;
                // Regex: Boleh kosong, ATAU hanya angka dengan opsional 1 titik
                if (val === '' || /^\d*\.?\d*$/.test(val)) {
                    setter(val);
                }
            };
            
            useEffect(() => {
                const currentSymbol = SYMBOLS[symbolIndex];
                const { type, pipSize, contractSize } = currentSymbol;
                
                const numBalance = parseFloat(balance) || 0;
                const numRisk = parseFloat(riskPercent) || 0;
                const numEntry = parseFloat(entryPrice) || 0;
                const numSL = parseFloat(stopLoss) || 0;
                const numTP = parseFloat(takeProfit) || 0;

                let diffSL = 0; let diffTP = 0; let isValid = true;

                if (position === 'LONG') {
                    diffSL = numEntry - numSL;
                    diffTP = numTP - numEntry;
                    if (diffSL <= 0 && numSL !== 0) isValid = false;
                } else {
                    diffSL = numSL - numEntry;
                    diffTP = numEntry - numTP;
                    if (diffSL <= 0 && numSL !== 0) isValid = false;
                }

                const slPips = isValid ? diffSL / pipSize : 0;
                const tpPips = isValid ? diffTP / pipSize : 0;

                let pipValuePerLot = 0;
                if (type === 'gold' || type === 'forex') pipValuePerLot = pipSize * contractSize;
                else if (type === 'usd-base' || type === 'jpy') pipValuePerLot = (pipSize * contractSize) / numEntry;

                const targetRiskMoney = numBalance * (numRisk / 100);
                let rawLot = 0;
                if (isValid && slPips > 0 && pipValuePerLot > 0) rawLot = targetRiskMoney / (slPips * pipValuePerLot);

                const finalLot = Math.floor(rawLot * 100) / 100;
                
                setResults({
                    targetRisk: targetRiskMoney,
                    lots: isFinite(finalLot) ? finalLot : 0,
                    slPips: slPips,
                    tpPips: tpPips,
                    rr: diffSL > 0 ? diffTP / diffSL : 0,
                    netSL: slPips * pipValuePerLot * finalLot,
                    netTP: tpPips * pipValuePerLot * finalLot,
                    pipValue: pipValuePerLot,
                    isValid: isValid
                });

            }, [symbolIndex, balance, riskPercent, position, entryPrice, stopLoss, takeProfit]);

            return (
                // min-h-screen, items-center, justify-center memastikan konten selalu nengah secara vertikal & horizontal
                <div className="min-h-screen w-full flex items-center justify-center p-4 md:p-8 transition-colors">
                    <div className="w-full max-w-4xl flex flex-col md:flex-row gap-12 md:gap-24">
                        
                        {/* INPUT SECTION */}
                        <div className="flex-1 space-y-8">
                            
                            <div className="flex justify-between items-start mb-10">
                                <div>
                                    <h1 className="text-xl font-light tracking-wide text-gray-900 dark:text-white mb-1">Bonaven Risk Calculator</h1>
                                    <div className="h-[1px] w-12 bg-gray-300 dark:bg-neutral-700"></div>
                                </div>
                                
                                {/* Theme Toggle Button */}
                                <button 
                                    onClick={() => setIsDark(!isDark)}
                                    className="flex items-center justify-center p-2 rounded-full border border-gray-200 dark:border-neutral-800 text-gray-500 hover:text-gray-900 dark:text-neutral-400 dark:hover:text-white transition-all bg-gray-50 dark:bg-neutral-900"
                                    title="Toggle Dark Mode"
                                >
                                    {isDark ? (
                                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                                            <circle cx="12" cy="12" r="5"></circle>
                                            <line x1="12" y1="1" x2="12" y2="3"></line>
                                            <line x1="12" y1="21" x2="12" y2="23"></line>
                                            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                                            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                                            <line x1="1" y1="12" x2="3" y2="12"></line>
                                            <line x1="21" y1="12" x2="23" y2="12"></line>
                                            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                                            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                                        </svg>
                                    ) : (
                                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                                            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                                        </svg>
                                    )}
                                </button>
                            </div>

                            <div className="flex gap-2">
                                <div className={`btn-minimal ${position === 'LONG' ? 'active' : 'inactive'}`} onClick={() => setPosition('LONG')}>LONG</div>
                                <div className={`btn-minimal ${position === 'SHORT' ? 'active' : 'inactive'}`} onClick={() => setPosition('SHORT')}>SHORT</div>
                            </div>

                            <div>
                                <label className="label-text">Symbol/Pair</label>
                                <select className="input-minimal w-full" value={symbolIndex} onChange={(e) => setSymbolIndex(Number(e.target.value))}>
                                    {SYMBOLS.map((s, i) => (<option key={i} value={i} className="bg-white text-black dark:bg-black dark:text-white">{s.name}</option>))}
                                </select>
                            </div>

                            <div className="grid grid-cols-2 gap-8">
                                <div>
                                    <label className="label-text">Balance</label>
                                    <input type="text" inputMode="decimal" className="input-minimal" placeholder="0" value={balance} onChange={handleStrictNumber(setBalance)} />
                                </div>
                                <div>
                                    <label className="label-text">Risk (%)</label>
                                    <input type="text" inputMode="decimal" className="input-minimal" placeholder="0" value={riskPercent} onChange={handleStrictNumber(setRiskPercent)} />
                                </div>
                            </div>

                            <div className="pt-4 space-y-6">
                                <div>
                                    <label className="label-text">Entry Price</label>
                                    <input type="text" inputMode="decimal" className="input-minimal" placeholder="0.00" value={entryPrice} onChange={handleStrictNumber(setEntryPrice)} />
                                </div>

                                <div className="grid grid-cols-2 gap-8">
                                    <div>
                                        <label className="label-text">Stop Loss</label>
                                        <input type="text" inputMode="decimal" className="input-minimal" placeholder="0.00" value={stopLoss} onChange={handleStrictNumber(setStopLoss)} />
                                    </div>
                                    <div>
                                        <label className="label-text">Take Profit</label>
                                        <input type="text" inputMode="decimal" className="input-minimal" placeholder="0.00" value={takeProfit} onChange={handleStrictNumber(setTakeProfit)} />
                                    </div>
                                </div>
                            </div>

                            {!results.isValid && (
                                <div className="text-xs text-red-500 mt-2 border-l border-red-500 pl-3 py-1">
                                    Invalid parameter: SL placement is incorrect.
                                </div>
                            )}
                        </div>

                        {/* RESULT SECTION */}
                        <div className="flex-1 flex flex-col justify-center">
                            <div className="border border-gray-200 dark:border-neutral-800 bg-gray-50/50 dark:bg-transparent p-8 md:p-12 rounded-xl md:rounded-none transition-colors">
                                <div className="mb-12">
                                    <p className="label-text">Recommended Lots</p>
                                    <p className="text-6xl md:text-7xl font-light tracking-tighter text-gray-900 dark:text-white transition-colors">
                                        {results.lots.toFixed(2)}
                                    </p>
                                </div>

                                <div className="grid grid-cols-2 gap-y-8 gap-x-4 mb-10">
                                    <div>
                                        <p className="label-text">Risk Value</p>
                                        <p className="text-lg font-medium text-gray-700 dark:text-neutral-300 transition-colors">{fmtMoney(results.targetRisk)}</p>
                                    </div>
                                    <div>
                                        <p className="label-text">Reward Ratio</p>
                                        <p className="text-lg font-medium text-gray-700 dark:text-neutral-300 transition-colors">1 : {results.rr.toFixed(2)}</p>
                                    </div>
                                </div>

                                <div className="h-[1px] w-full bg-gray-200 dark:bg-neutral-800 mb-8 transition-colors"></div>

                                <div className="space-y-6">
                                    <div className="flex justify-between items-end">
                                        <div>
                                            <p className="label-text">SL Distance</p>
                                            <p className="text-sm text-gray-600 dark:text-white transition-colors">{results.slPips.toFixed(1)} pips</p>
                                        </div>
                                        <div className="text-right">
                                            <p className="text-lg font-mono text-gray-900 dark:text-white transition-colors">-{fmtMoney(results.netSL)}</p>
                                        </div>
                                    </div>

                                    <div className="flex justify-between items-end">
                                        <div>
                                            <p className="label-text">TP Distance</p>
                                            <p className="text-sm text-gray-600 dark:text-white transition-colors">{results.tpPips.toFixed(1)} pips</p>
                                        </div>
                                        <div className="text-right">
                                            <p className="text-lg font-mono text-gray-900 dark:text-white transition-colors">+{fmtMoney(results.netTP)}</p>
                                        </div>
                                    </div>
                                </div>
                                
                            </div>
                        </div>
                        
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
